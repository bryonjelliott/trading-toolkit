# Netlify configuration for the Trading Toolkit.
# Static site lives in /web; the scanner runs as a serverless function.

[build]
  publish = "web"
  functions = "netlify/functions"
  # No build step needed for the static frontend. Netlify auto-installs
  # function dependencies (yahoo-finance2) from package.json.
  command = "echo 'No build step — static site + function'"

[build.environment]
  # SUPABASE_URL and the anon key are PUBLIC client config — they live in
  # web/assets/config.js by design (every browser needs them). Exempt them so
  # Netlify's secret scanner doesn't fail the build. The real secret,
  # SUPABASE_SERVICE_KEY, is never in the code and stays fully scanned everywhere.
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL"
  SECRETS_SCAN_OMIT_PATHS = "web/assets/config.js"

[functions]
  node_bundler = "esbuild"

# Friendly path: /api/scan -> the serverless function
[[redirects]]
  from = "/api/scan"
  to = "/.netlify/functions/scan"
  status = 200

# /api/trigger-scan -> fire the GitHub scan workflow on demand
[[redirects]]
  from = "/api/trigger-scan"
  to = "/.netlify/functions/trigger-scan"
  status = 200
